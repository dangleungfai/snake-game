<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇 — 演示版</title>
  <!-- 样式独立文件，便于维护与讲解 -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="app__header">
      <h1 class="app__title">贪吃蛇</h1>
      <p class="app__subtitle">方向键控制 · 吃食物得分 · 撞墙或撞到自己则结束</p>
    </header>

    <section class="panel" aria-label="游戏信息与控制">
      <div class="panel__stats">
        <span class="panel__label">当前分数</span>
        <span id="scoreDisplay" class="panel__score">0</span>
      </div>
      <div class="panel__speed" aria-label="移动速度">
        <span class="panel__label">速度</span>
        <div class="panel__speed-btns" role="group">
          <button type="button" class="btn btn--ghost btn--speed" data-speed-index="0">慢</button>
          <button type="button" class="btn btn--ghost btn--speed" data-speed-index="1">中</button>
          <button type="button" class="btn btn--ghost btn--speed" data-speed-index="2">快</button>
        </div>
      </div>
      <div class="panel__actions">
        <button type="button" id="btnStart" class="btn btn--primary">开始游戏</button>
        <button type="button" id="btnRestart" class="btn btn--secondary">重新开始</button>
      </div>
    </section>

    <!-- 游戏结束提示：默认隐藏，由 JS 控制显示 -->
    <div id="gameOverBanner" class="game-over" hidden role="alert">
      游戏结束
    </div>

    <!-- 20×20 网格由 script.js 动态生成单元格 -->
    <div
      id="gameBoard"
      class="game-board"
      role="grid"
      aria-label="游戏区域，二十乘二十格"
    ></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
